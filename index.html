<!doctype html>
<html>
<body>
<script>
console.log("attacker page loaded");

const w = window.open("about:blank", "_blank");
if (!w) {
  console.log("popup blocked");
} else {
  console.log("popup opened");

  try {
    w.name = "ghost_marker_" + Math.random().toString(36).slice(2);
    console.log("name set to: " + w.name);
    console.log("before nav href: " + w.location.href);
  } catch (e) {
    console.log("initial setup failed: " + e.message);
  }

  setTimeout(() => {
    console.log("navigating popup to ritual-app");
    w.location = "http://ritual-app:5000/";
  }, 500);

  setTimeout(() => {
    try {
      console.log("after nav closed=" + w.closed);
      console.log("after nav name=" + w.name);
    } catch (e) {
      console.log("after nav name read failed: " + e.message);
    }

    try {
      console.log("after nav href=" + w.location.href);
    } catch (e) {
      console.log("after nav href read failed: " + e.message);
    }
  }, 1800);
}
</script>
</body>
</html>
</html>
