<!doctype html>
<html>
<body>
<script>
console.log("race test page loaded", Date.now());

const w = window.open("about:blank");
console.log("popup opened", !!w, Date.now());

if (!w) {
  console.log("popup blocked");
} else {
  try {
    w.document.write(`
      <script>
        console.log("child about:blank start", Date.now());
        window.name = "ghost_" + Math.random().toString(36).slice(2);
        console.log("child name set", window.name, Date.now());
      <\/script>
    `);
    console.log("write ok", Date.now());
  } catch (e) {
    console.log("write failed", e.message);
  }

  let urls = [
    "http://ritual-app:5000/",
    "about:blank",
    "http://ritual-app:5000/",
    "about:blank",
    "http://ritual-app:5000/"
  ];

  urls.forEach((u, i) => {
    setTimeout(() => {
      try {
        w.location = u;
        console.log("nav", i, u, Date.now());
      } catch (e) {
        console.log("nav failed", i, e.message);
      }
    }, i);
  });

  let n = 0;
  const t = setInterval(() => {
    n++;
    try {
      console.log("tick", n, "closed=", w.closed, Date.now());
    } catch (e) {
      console.log("tick fail", n, e.message);
    }
    if (n > 30) clearInterval(t);
  }, 1);
}
</script>
</body>
</html>
